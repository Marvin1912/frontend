<div class="plant-table">
  <header class="table-header">
    <span class="table-header__dot"></span>
    <span class="table-header__label">MANAGEMENT</span>
  </header>

  <div class="table-container">
    <table mat-table [dataSource]="plants">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef class="col-header">Name</th>
        <td mat-cell *matCellDef="let plant">{{ plant.name }}</td>
      </ng-container>

      <ng-container matColumnDef="species">
        <th mat-header-cell *matHeaderCellDef class="col-header">Species</th>
        <td mat-cell *matCellDef="let plant">{{ plant.species }}</td>
      </ng-container>

      <ng-container matColumnDef="image">
        <th mat-header-cell *matHeaderCellDef class="col-header">Image</th>
        <td mat-cell *matCellDef="let plant">
          @if (plant.image) {
            <button class="icon-btn icon-btn--blue" mat-icon-button (click)="openImageDialog(plant); $event.stopPropagation()" (mouseenter)="hidePlantPreview()" (mouseleave)="showPlantPreview(plant, $event)">
              <mat-icon>image</mat-icon>
            </button>
          } @else {
            <button class="icon-btn icon-btn--blue" mat-icon-button (click)="openCreateImageDialog(plant); $event.stopPropagation()" (mouseenter)="hidePlantPreview()" (mouseleave)="showPlantPreview(plant, $event)">
              <mat-icon fontIcon="broken_image"></mat-icon>
            </button>
          }
        </td>
      </ng-container>

      <ng-container matColumnDef="delete">
        <th mat-header-cell *matHeaderCellDef class="col-header">Delete</th>
        <td mat-cell *matCellDef="let plant">
          <button class="icon-btn icon-btn--pink" mat-icon-button (click)="openDeletePlantDialog(plant); $event.stopPropagation()" (mouseenter)="hidePlantPreview()" (mouseleave)="showPlantPreview(plant, $event)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
      <tr
        mat-row *matRowDef="let plant; columns: columnsToDisplay;"
        class="clickable-row"
        (click)="navigateToPlant(plant.id)"
        (mouseenter)="showPlantPreview(plant, $event)"
        (mouseleave)="hidePlantPreview()">
      </tr>

    </table>
  </div>

  <!-- Plant Preview Container -->
  @if (previewVisible) {
    <div
      class="plant-preview-container"
      [style.left.px]="previewPosition.x"
      [style.top.px]="previewPosition.y"
      (mouseenter)="keepPreviewVisible()"
      (mouseleave)="hidePlantPreview()">
      <app-plant-preview [plant]="currentPreviewPlant"></app-plant-preview>
    </div>
  }
</div>
