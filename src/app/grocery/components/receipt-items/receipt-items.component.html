<div class="receipt-items">
  <header class="table-header">
    <span class="table-header__dot"></span>
    <span class="table-header__label">ARTIKEL</span>
    <button mat-icon-button class="btn-add" (click)="openAddDialog()">
      <mat-icon>add</mat-icon>
    </button>
  </header>

  <div class="table-container">
    <table mat-table [dataSource]="items">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef class="col-header">Artikel</th>
        <td mat-cell *matCellDef="let item">{{ item.name }}</td>
      </ng-container>

      <ng-container matColumnDef="quantity">
        <th mat-header-cell *matHeaderCellDef class="col-header">Menge</th>
        <td mat-cell *matCellDef="let item">{{ item.quantity }}</td>
      </ng-container>

      <ng-container matColumnDef="singlePrice">
        <th mat-header-cell *matHeaderCellDef class="col-header">Einzelpreis</th>
        <td mat-cell *matCellDef="let item">
          {{ item.singlePrice | currency:'EUR':'symbol':'1.2-2':'de' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef class="col-header">Preis</th>
        <td mat-cell *matCellDef="let item">
          {{ item.price | currency:'EUR':'symbol':'1.2-2':'de' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="col-header"></th>
        <td mat-cell *matCellDef="let item" class="col-actions">
          <button mat-icon-button class="btn-edit" (click)="openEditDialog(item)">
            <mat-icon>edit</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
      <tr mat-row *matRowDef="let item; columns: columnsToDisplay;"></tr>

    </table>
  </div>
</div>
