<div class="nutrition-layout">
  <header class="topbar">
    <div class="topbar__left">
      <button mat-icon-button class="nav-btn" aria-label="Go home" [routerLink]="homeLink">
        <mat-icon>home</mat-icon>
      </button>
      <button mat-icon-button class="nav-btn" aria-label="Open menu" [matMenuTriggerFor]="menu">
        <mat-icon>more_vert</mat-icon>
      </button>
      <mat-menu #menu="matMenu">
        <button mat-menu-item routerLink="/nutrition">
          <span>Home</span>
        </button>
        <button mat-menu-item routerLink="/nutrition/day">
          <span>Tagebuch</span>
        </button>
        <button mat-menu-item routerLink="/nutrition/weight">
          <span>Gewicht</span>
        </button>
        <button mat-menu-item routerLink="/nutrition/foods">
          <span>Lebensmittel</span>
        </button>
        <button mat-menu-item routerLink="/nutrition/profile">
          <span>Profil</span>
        </button>
      </mat-menu>
    </div>

    <div class="topbar__brand">
      <span class="topbar__hex">⬡</span>
      <span class="topbar__name">NUTRITION</span>
    </div>

    <div class="topbar__right"></div>
  </header>

  <main class="content">
    <router-outlet />
  </main>
</div>
