<div class="container h-100">
  <header class="row header-row p-2">
    <div class="col-4 col-sm-2 d-flex justify-content-between align-items-center">
      <button mat-fab [routerLink]="homeLink" class="header-button">
        <mat-icon>home</mat-icon>
      </button>
      <button mat-fab [matMenuTriggerFor]="menu" class="header-button">
        <mat-icon>more_vert</mat-icon>
      </button>
      <mat-menu #menu="matMenu">
        <button mat-menu-item routerLink="/vocabulary/add">
          <span>Add Word</span>
        </button>
        <button mat-menu-item routerLink="/vocabulary/list">
          <span>Word List</span>
        </button>
        <button mat-menu-item routerLink="/vocabulary">
          <span>Vocabulary Home</span>
        </button>
      </mat-menu>
    </div>
    <div class="col-8 col-sm-10 d-flex flex-column justify-content-center align-items-center">
      <h1 class="vocabulary-header-title">Vocabulary</h1>
    </div>
  </header>
  <div class="row image-row">
    <div class="col vocabulary-image"></div>
  </div>
  <main class="row data-row">
    <div class="col h-100 d-flex flex-column">
      <div class="d-flex justify-content-center gap-2 p-3">
        <div class="card" routerLink="/vocabulary/add">
          <h2>Add Word</h2>
        </div>
        <div class="card" routerLink="/vocabulary/list">
          <h2>List</h2>
        </div>
      </div>
      <div style="min-height: 60%; flex: 1 1 auto">
        <router-outlet></router-outlet>
      </div>
    </div>
  </main>
</div>
