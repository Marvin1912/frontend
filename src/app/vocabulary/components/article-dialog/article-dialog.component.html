<h2 mat-dialog-title>Select an article!</h2>

<mat-dialog-content>
  <div class="article-btn-group">
    @for (article of articles; track $index) {
      <button
        mat-flat-button
        class="article-btn"
        [mat-dialog-close]="article"
      >{{ article }}
      </button>
    }
  </div>
</mat-dialog-content>
